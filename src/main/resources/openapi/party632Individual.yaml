        contactMedium:
          type: array
          items:
            $ref: '#/components/schemas/ContactMedium'
        disability:
          type: array
          items:
            $ref: '#/components/schemas/Disability'
        individualIdentification:
          type: array
          items:
            $ref: '#/components/schemas/IndividualIdentification'
        languageAbility:
          type: array
          items:
            $ref: '#/components/schemas/LanguageAbility'
        partyCharacteristic:
          type: array
          items:
