openapi: 3.0.1
info:
  title: Party Management
  description: 'This is Swagger specification for the TMF Party Management. '
  version: "$Revision: 1.22 $"
servers:
  - url: http://serverRoot/api/party-management/v4/
tags:
  - name: individual
paths:
  /individual:
    get:
      tags:
        - individual
      summary: List or find Individual objects
      description: This operation list or find Individual entities
      operationId: listIndividual
      parameters:
        - name: objKeys
          in: query
          description: Comma-separated object keys for which details to be retrieved.
            Mandatory when retrievalType is 3
          schema:
            type: string
        - name: retrievalLimit
          in: query
          description: Limit to the number of objects retrieved. Mandatory when retrievalType
            is 1
          schema:
            type: integer
            format: int64
        - name: retrievalType
          in: query
          description: "Type of retrieval of data. 1 -> retrieves the list of all object\
          \ keys along with the number of object details mentioned in retrievalLimit,\
          \ 2 -> retrieves the list of all object keys, 3 -> retrieves object details\
          \ for the keys mentioned in objKeys"
          required: true
          schema:
            type: integer
            format: int64
        - name: fields
          in: query
          description: Comma-separated properties to be provided in response
          schema:
            type: string
        - name: searchKey
          in: query
          description: "Search Keys on which data needs to be filtered. Valid Values:\
          \ Name | MSISDN | IMSI | National ID | Email ID | Passport ID.  These values\
          \ will be retrieved from RT perestapi.imp.contact.GlobalSrchFilters"
          schema:
            type: string
            x-refdata-source: RT-perestapi.imp.contact.GlobalSrchFilters
          x-refdata-source: RT-perestapi.imp.contact.GlobalSrchFilters
        - name: searchValue
          in: query
          description: Value of the searchKey passed.
          schema:
            type: string
        - name: sortKey
          in: query
          description: To sort the response based on sortkeys. Possible values name.
            These values will be retrieved from RT perestapi.imp.contact.SORT_KEY
          schema:
            type: string
            x-refdata-source: RT-perestapi.imp.contact.SORT_KEY
          x-refdata-source: RT-perestapi.imp.contact.SORT_KEY
        - name: sortOrder
          in: query
          description: "To sort the response based on sort order. Possible value ascending,\
          \ descending"
          schema:
            type: string
        - name: contactType
          in: query
          description: "contact type of the contact to be retrieved.Comma seperated\
          \ multiple contact types can also be provided. Possible values: Residential,\
          \ Business, Registered Prepaid, Anonymous Prepaid. These values will be\
          \ retrieved from RT api.imp.PERSON_TYPE"
          schema:
            type: string
            x-refdata-source: RT-api.imp.PERSON_TYPE
          x-refdata-source: RT-api.imp.PERSON_TYPE
        - name: customerId
          in: query
          description: "All assiciated contacts of the customer node id to be retrieved.\
          \ SV_MAPPING: Cust_Acct.XSID_I"
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json;charset=utf-8:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Individual_List'
        "400":
          description: Bad Request
          content:
            application/json;charset=utf-8:
              schema:
                $ref: '#/components/schemas/Error'
        "401":
          description: Unauthorized
          content:
            application/json;charset=utf-8:
              schema:
                $ref: '#/components/schemas/Error'
        "403":
          description: Forbidden
          content:
            application/json;charset=utf-8:
              schema:
                $ref: '#/components/schemas/Error'
        "404":
          description: Not Found
          content:
            application/json;charset=utf-8:
              schema:
                $ref: '#/components/schemas/Error'
        "405":
          description: Method Not allowed
          content:
            application/json;charset=utf-8:
              schema:
                $ref: '#/components/schemas/Error'
        "409":
          description: Conflict
          content:
            application/json;charset=utf-8:
              schema:
                $ref: '#/components/schemas/Error'
        "500":
          description: Internal Server Error
          content:
            application/json;charset=utf-8:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      tags:
        - individual
      summary: Creates a Individual
      description: This operation creates a Individual entity.
      operationId: createIndividual
      parameters:
        - name: Ignored-Warning
          in: header
          description: To store warning message IDs in comma separated string that will
            be ignored by the server
          schema:
            type: string
      requestBody:
        description: The Individual to be created
        content:
          application/json;charset=utf-8:
            schema:
              $ref: '#/components/schemas/Individual_Create'
        required: true
      responses:
        "201":
          description: Created
          headers:
            Ignored-Warning:
              description: To store warning message IDs in comma separated string
                of same API call that have been successfully ignored in server
              schema:
                type: string
          content:
            application/json;charset=utf-8:
              schema:
                $ref: '#/components/schemas/Individual'
        "400":
          description: Bad Request
          headers:
            Ignored-Warning:
              description: To store warning message IDs in comma separated string
                of same API call that have been successfully ignored in server
              schema:
                type: string
          content:
            application/json;charset=utf-8:
              schema:
                $ref: '#/components/schemas/Error'
        "401":
          description: Unauthorized
          headers:
            Ignored-Warning:
              description: To store warning message IDs in comma separated string
                of same API call that have been successfully ignored in server
              schema:
                type: string
          content:
            application/json;charset=utf-8:
              schema:
                $ref: '#/components/schemas/Error'
        "403":
          description: Forbidden
          headers:
            Ignored-Warning:
              description: To store warning message IDs in comma separated string
                of same API call that have been successfully ignored in server
              schema:
                type: string
          content:
            application/json;charset=utf-8:
              schema:
                $ref: '#/components/schemas/Error'
        "405":
          description: Method Not allowed
          headers:
            Ignored-Warning:
              description: To store warning message IDs in comma separated string
                of same API call that have been successfully ignored in server
              schema:
                type: string
          content:
            application/json;charset=utf-8:
              schema:
                $ref: '#/components/schemas/Error'
        "409":
          description: Conflict
          headers:
            Ignored-Warning:
              description: To store warning message IDs in comma separated string
                of same API call that have been successfully ignored in server
              schema:
                type: string
          content:
            application/json;charset=utf-8:
              schema:
                $ref: '#/components/schemas/Error'
        "500":
          description: Internal Server Error
          headers:
            Ignored-Warning:
              description: To store warning message IDs in comma separated string
                of same API call that have been successfully ignored in server
              schema:
                type: string
          content:
            application/json;charset=utf-8:
              schema:
                $ref: '#/components/schemas/Error'
      x-codegen-request-body-name: individual
  /individual/{id}:
    get:
      tags:
        - individual
      summary: Retrieves a Individual by ID
      description: This operation retrieves a Individual entity. Attribute selection
        is enabled for all first level attributes.         The id parameter cannot
        contain a space which is considered as unsave character and would be encoded
        by HTTP protocol
      operationId: retrieveIndividual
      parameters:
        - name: id
          in: path
          description: Identifier of the Individual
          required: true
          schema:
            type: string
        - name: fields
          in: query
          description: Comma-separated properties to provide in response.The field names
            should be from the first level of property names as defined in Individual
            schema.
          schema:
            type: string
        - name: effectiveDate
          in: query
          description: "To search a specific party history record details based on a\
          \ given effective date value - Format: yyyy-mm-ddThh:nn:ss"
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Success
          content:
            application/json;charset=utf-8:
              schema:
                $ref: '#/components/schemas/Individual'
        "400":
          description: Bad Request
          content:
            application/json;charset=utf-8:
              schema:
                $ref: '#/components/schemas/Error'
        "401":
          description: Unauthorized
          content:
            application/json;charset=utf-8:
              schema:
                $ref: '#/components/schemas/Error'
        "403":
          description: Forbidden
          content:
            application/json;charset=utf-8:
              schema:
                $ref: '#/components/schemas/Error'
        "404":
          description: Not Found
          content:
            application/json;charset=utf-8:
              schema:
                $ref: '#/components/schemas/Error'
        "405":
          description: Method Not allowed
          content:
            application/json;charset=utf-8:
              schema:
                $ref: '#/components/schemas/Error'
        "409":
          description: Conflict
          content:
            application/json;charset=utf-8:
              schema:
                $ref: '#/components/schemas/Error'
        "500":
          description: Internal Server Error
          content:
            application/json;charset=utf-8:
              schema:
                $ref: '#/components/schemas/Error'
    patch:
      tags:
        - individual
      summary: Updates partially a Individual
      description: This operation updates partially a Individual entity.The id parameter
        cannot contain a space which is considered as unsave character and would be
        encoded by HTTP protocol
      operationId: patchIndividual
      parameters:
        - name: id
          in: path
          description: Identifier of the Individual
          required: true
          schema:
            type: string
        - name: Ignored-Warning
          in: header
          description: To store warning message IDs in comma separated string that will
            be ignored by the server
          schema:
            type: string
      requestBody:
        description: The Individual to be updated
        content:
          application/json;charset=utf-8:
