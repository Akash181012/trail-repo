components:
  schemas:
    Characteristic:
      required:
        - name
        - value
      type: object
      properties:
        name:
          type: string
          description: ResidencyStatus | CompanyName | CorporateVatNumber | IndustryType
            | SalesRepresentative | PersonalVatNumber | CreationDate | LastInteractionDate
            | OpenCasesCount | VisaType | VisaNumber | VisaExpiry | Employer | YearlyEarnings
            | YearlyEarningsCurrency | PreferredCall | PreferredEmail | PreferredSMS
            | PreferredLanguage | ConvenientTime | StoreAddress | AssignedUser | ConvenientStartTime
            | ConvenientEndTime | AdditionalMobileSubscriptionAllowed | Classification
            | Deceased | WhitelistEndDate | Blacklisted | ThisIndividualPartyRole
            | SecutityGroup | ContactRole | SkipBOMPosting | VASPin | PreferredCommunicationMethod
            | DedicatedCSRHotline | RequestEraseIndCode | ErasureRequestedDate | TimeZone
        valueType:
          type: string
          description: ResidencyStatus -> string | CompanyName -> string |CorporateVatNumber
            -> string | IndustryType -> string | SalesRepresentative -> string | PersonalVatNumber
            -> string | CreationDate -> string | LastInteractionDate -> string | OpenCasesCount
            -> string | VisaType -> string | VisaNumber -> string | VisaExpiry ->
            string | Employer -> string | YearlyEarnings -> string | YearlyEarningsCurrency
            -> string |  PreferredCall -> string | PreferredEmail -> string | PreferredSMS
            -> string | PreferredLanguage -> string | ConvenientTime -> string | StoreAddress
            -> string | AssignedUser -> string | ConvenientStartTime -> string | ConvenientEndTime
            -> string | AdditionalMobileSubscriptionAllowed -> string | Classification
            -> string | Deceased -> string | WhitelistEndDate -> string | Blacklisted
            -> string | ThisIndividualPartyRole -> string | SecutityGroup -> string
            | ContactRole -> string | SkipBOMPosting -> string | VASPin -> string
            | PreferredCommunicationMethod -> string | DedicatedCSRHotline -> string
            | RequestEraseIndCode -> string | ErasureRequestedDate -> string | TimeZone
            -> string.
        value:
          type: string
          description: "The value of this attribute is depending on the corresponding\
            \ name attribute which will determine the exact internal field to map.\
            \ ResidencyStatus-> Residency Status RT -> SV_MAPPING:Contact.ResidencyStatus_R\
            \ | CompanyName -> SV_MAPPING:Contact.OfficialName_X | CorporateVatNumber\
            \ -> SV_MAPPING:Contact.General10_X | IndustryType -> SV_MAPPING:Contact.General9_X\
            \ | SalesRepresentative -> SV_MAPPING:Contact.OperatorID_R |  PersonalVatNumber\
            \ -> SV_MAPPING:Contact.General10_X | CreationDate -> SV_MAPPING:Case.Date_Received\
            \ | LastInteractionDate -> SV_MAPPING:Contact.Last_Update | OpenCasesCount\
            \ -> SV_MAPPING:Contact.ContactOpenCases_I | VisaType -> SV_MAPPING:Contact.Contact.VisaType_R\
            \ | VisaNumber -> SV_MAPPING:Contact.VisaNum_X | VisaExpiry -> SV_MAPPING:VisaExpiryDate_T\
            \ | Employer -> SV_MAPPING:Contact.BusinessName_X | YearlyEarnings ->\
            \ SV_MAPPING:Contact.YearlyEarnings_C | YearlyEarningsCurrency -> SV_MAPPING:Contact.YearlyEarningsCurrency_R\
            \ | PreferredCall -> SV_MAPPING:UI_ContactPreference.PreferredCall_B |\
            \ PreferredEmail -> SV_MAPPING:UI_ContactPreference.PreferredEmail_B |\
            \ PreferredSMS -> SV_MAPPING:UI_ContactPreference.PreferredSMS_B | PreferredLanguage\
            \ -> SV_MAPPING: UI_ContactPreference.PreferredLanguage_R | ConvenientTime\
            \ -> SV_MAPPING:UI_ContactPreference.ConvenientTime_R | StoreAddress ->\
            \ SV_MAPPING:UI_ContactPreference.Store_X | AssignedUser -> SV_MAPPING:UI_ContactPreference.AssignedUser_R\
            \ | ConvenientStartTime -> SV_MAPPING:UI_ContactPreference.ConvenientStartTime_T\
            \ | ConvenientEndTime -> SV_MAPPING:UI_ContactPreference.ConvenientEndTime_T\
            \ | AdditionalMobileSubscriptionAllowed -> SV_MAPPING:Contact.AddnlSubcnAllwd_B\
            \ | Classification -> SV_MAPPING:Contact.Classification_R | Deceased ->\
            \ SV_MAPPING:Contact.IsDeceased_B | WhitelistEndDate -> SV_MAPPING:Contact.WhitelistEndDate_T\
            \ | Blacklisted -> SV_MAPPING:Contact.IsBlacklisted_B | SV_MAPPING: perestapi.RELATED_PARTY_ROLE\
            \ | SecutityGroup -> SV_MAPPING:Contact.Security_Group | ContactRole ->\
            \ SV_MAPPING:SV_MAPPING:CustAcct_Contact.UI_Role_R | SkipBOMPosting ->\
            \ SV_MAPPING:Contact.Skip_BOM_Posting_T | VASPin -> SV_MAPPING:Contact.VasPin_I\
            \ | PreferredCommunicationMethod -> SV_MAPPING:Contact.PreferredCommsMethod_R\
            \ | DedicatedCSRHotline -> SV_MAPPING:Contact.DedicatedCSRNum_X | RequestEraseIndCode\
            \ -> SV_MAPPING:Contact.ErasureRequested_B | RequestEraseIndCode -> SV_MAPPING:Contact.ErasureRequestedDate_T\
            \ | TimzeZone -> SV_MAPPING:Contact.TimeZone_R"
          x-refdata-source: RT-RESIDENCY_STATUS|||||||||RT-VISA_TYPE|||||CM-Currency||||CM-Language_Spoken|CM-Convenient_Time|||||RT-BOOLEAN|RT-CONTACT_CLASSIFICATION|RT-BOOLEAN||RT-BOOLEAN|RT-perestapi.RELATED_PARTY_ROLE||perestapi.imp.CONTACT_ROLE|||RT-PREFERRED_COMMS_METHOD|||RT-BOOLEAN|RT-TIME_ZONE
      description: Describes a given characteristic of an object or entity through
        a name/value pair.
    ContactMedium:
      type: object
      properties:
        mediumType:
          type: string
          description: Medium type which can be either of HomeAddress | PostalAddress
            | WorkAddress | HomeNumber | WorkNumber | MobileNumber | FaxNumber | DefaultEmailAddress
            | SecondaryEmailAddress | VerifiedSecondaryEmailAddress
        characteristic:
          $ref: '#/components/schemas/MediumCharacteristic'
      description: Indicates the contact medium that could be used to contact the
        party.
    Disability:
      type: object
      properties:
        disabilityName:
          type: string
          description: "DISABILITY_TYPE RT, SV_MAPPING:Contact.DisabilityType_R"
