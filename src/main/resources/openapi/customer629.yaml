openapi: 3.0.1
info:
  title: Customer Management
  description: This is Swagger specification for the TMF Customer Management.
  version: "$Revision: 1.40 $"
servers:
  - url: http://serverRoot/api/customer-management/v4/
tags:
  - name: customer
paths:
  /customer:
    get:
      tags:
        - customer
      summary: List or find Customer objects
      description: This operation list or find Customer entities
      operationId: listCustomer
      parameters:
        - name: fields
          in: query
          description: Comma-separated properties to be provided in response.The field
            names should be from the first level of property names as defined in Customer
            schema.
          schema:
            type: string
        - name: csrId
          in: query
          description: It is logged in csr id and it is mandatory when List of VIP and
            Enterprise is fetched.
          schema:
            type: string
        - name: sortKey
          in: query
          description: To sort the response based on sortkeys. Possible values name.
            Values will be retrieved from RT perestapi.imp.cust.SORT_KEY
          schema:
            type: string
            x-refdata-source: RT-perestapi.imp.cust.SORT_KEY
          x-refdata-source: RT-perestapi.imp.cust.SORT_KEY
        - name: sortOrder
          in: query
          description: "To sort the response based on sort order. Possible value ascending,\
          \ descending"
          schema:
            type: string
        - name: retrievalType
          in: query
          description: "Type of retrieval of data. 1 -> retrieves the list of all object\
          \ keys along with the number of object details mentioned in retrievalLimit,\
          \ 2 -> retrieves the list of all object keys, 3 -> retrieves object details\
          \ for the keys mentioned in objKeys"
          required: true
          schema:
            type: string
        - name: retrievalLimit
          in: query
          description: Limit to the number of objects retrieved. Mandatory when retrievalType
            is 1
          schema:
            type: string
        - name: objKeys
          in: query
          description: Comma-separated object keys for which details to be retrieved.
            Mandatory when retrievalType is 3
          schema:
            type: string
        - name: customerType
          in: query
          description: To retrieve the customers by type - SV_MAPPING:Cust_Acct_Type.DisplayName_X
            - RT api.imp.ALL_CC_CUSTOMER_TYPE. Can be used together with retrievalType
            parameter or as additional parameter to searchKey and searchValue
          schema:
            type: string
            x-refdata-source: RT-api.imp.ALL_CC_CUSTOMER_TYPE
          x-refdata-source: RT-api.imp.ALL_CC_CUSTOMER_TYPE
        - name: customerRank
          in: query
          description: "It tells if VIP list of customers are needed to be retrieved.\
          \ Possible Value: VIP. Can be used together with retrievalType parameter"
          schema:
            type: integer
            format: int64
            x-refdata-source: RT-accl.cust.CUSTOMER_RANK
          x-refdata-source: RT-accl.cust.CUSTOMER_RANK
        - name: listEntCustFlag
          in: query
          description: "It tells if list of enterprise customers are needed to be retrieved.\
          \ Possible Value: 1. Can be used together with retrievalType parameter"
          schema:
            type: integer
            format: int64
        - name: searchKey
          in: query
          description: "Search Keys on which data needs to be filtered. Valid Values:\
          \ Name | MSISDN | IMSI | National ID | Account Number | Company Number |\
          \ Passport ID. These values will be retrieved from RT perestapi.imp.cust.GlobalSrchFilters.\
          \ Can be used together with retrievalType parameter"
          schema:
            type: string
            x-refdata-source: RT-perestapi.imp.cust.GlobalSrchFilters
          x-refdata-source: RT-perestapi.imp.cust.GlobalSrchFilters
        - name: searchValue
          in: query
          description: Value of the searchKey passed. Mandatory when searchKey is use.
          schema:
            type: string
        - name: rootNodeId
          in: query
          description: "To retrieve the customers by root customer node id - SV_MAPPING:\
          \ Cust_Acct.RootCustAcct_R. Can be used together with retrievalType parameter\
          \ or as additional parameter to searchKey and searchValue."
          schema:
            type: string
        - name: parentNodeId
          in: query
          description: "To retrieve the customers by parent customer node id - SV_MAPPING:\
          \ Cust_Acct.ParentCustAcct_R. Can be used together with retrievalType parameter\
          \ or as additional parameter to searchKey and searchValue."
          schema:
            type: string
        - name: individualId
          in: query
          description: "To retrieve customer by Individual Id - SV_MAPPING:CustAcct_Contact.Contact.XSID.\
          \ Can be used together with retrievalType parameter or with additional parameter\
          \ customerType, rootNodeId or parentNodeId."
          schema:
            type: string
        - name: reason
          in: query
          description: "The reason for which API is called. Valid values: BalanceTransfer.\
          \ This value will be retrieved from RT perestapi.REASON. It is used with\
          \ searchKey is Account Number"
          schema:
            type: string
            x-refdata-source: RT-perestapi.REASON
          x-refdata-source: RT-perestapi.REASON
      responses:
        "200":
          description: Success
          content:
            application/json;charset=utf-8:
              schema:
                $ref: '#/components/schemas/Customer_List'
        "400":
          description: Bad Request
          content:
            application/json;charset=utf-8:
              schema:
                $ref: '#/components/schemas/Error'
        "401":
          description: Unauthorized
          content:
            application/json;charset=utf-8:
              schema:
                $ref: '#/components/schemas/Error'
        "403":
          description: Forbidden
          content:
            application/json;charset=utf-8:
              schema:
                $ref: '#/components/schemas/Error'
        "404":
          description: Not Found
          content:
            application/json;charset=utf-8:
              schema:
                $ref: '#/components/schemas/Error'
        "405":
          description: Method Not allowed
          content:
            application/json;charset=utf-8:
              schema:
                $ref: '#/components/schemas/Error'
        "409":
          description: Conflict
          content:
            application/json;charset=utf-8:
              schema:
                $ref: '#/components/schemas/Error'
        "500":
          description: Internal Server Error
          content:
            application/json;charset=utf-8:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      tags:
        - customer
      summary: Creates a Customer
      operationId: createCustomer
      parameters:
        - name: Ignored-Warning
          in: header
          description: To store warning message IDs in comma separated string that will
            be ignored by the server
          schema:
            type: string
      requestBody:
        description: The Customer to be created
        content:
          application/json;charset=utf-8:
            schema:
              $ref: '#/components/schemas/Customer_Create'
        required: true
      responses:
        "201":
          description: Created
          headers:
            Ignored-Warning:
              description: To store warning message IDs in comma separated string
                of same API call that have been successfully ignored in server
              schema:
                type: string
          content:
            application/json;charset=utf-8:
              schema:
                $ref: '#/components/schemas/Customer'
        "400":
          description: Bad Request
          headers:
            Ignored-Warning:
              description: To store warning message IDs in comma separated string
                of same API call that have been successfully ignored in server
              schema:
                type: string
          content:
            application/json;charset=utf-8:
              schema:
                $ref: '#/components/schemas/Error'
        "401":
          description: Unauthorized
          headers:
            Ignored-Warning:
              description: To store warning message IDs in comma separated string
                of same API call that have been successfully ignored in server
              schema:
                type: string
          content:
            application/json;charset=utf-8:
              schema:
                $ref: '#/components/schemas/Error'
        "403":
          description: Forbidden
          headers:
            Ignored-Warning:
              description: To store warning message IDs in comma separated string
                of same API call that have been successfully ignored in server
              schema:
                type: string
          content:
            application/json;charset=utf-8:
              schema:
                $ref: '#/components/schemas/Error'
        "404":
          description: Not Found
          headers:
            Ignored-Warning:
              description: To store warning message IDs in comma separated string
                of same API call that have been successfully ignored in server
              schema:
                type: string
          content:
            application/json;charset=utf-8:
              schema:
                $ref: '#/components/schemas/Error'
        "405":
          description: Method Not allowed
          headers:
            Ignored-Warning:
              description: To store warning message IDs in comma separated string
                of same API call that have been successfully ignored in server
              schema:
                type: string
          content:
            application/json;charset=utf-8:
              schema:
                $ref: '#/components/schemas/Error'
        "409":
          description: Conflict
          headers:
            Ignored-Warning:
              description: To store warning message IDs in comma separated string
                of same API call that have been successfully ignored in server
              schema:
                type: string
          content:
            application/json;charset=utf-8:
              schema:
                $ref: '#/components/schemas/Error'
        "500":
          description: Internal Server Error
          headers:
            Ignored-Warning:
              description: To store warning message IDs in comma separated string
                of same API call that have been successfully ignored in server
              schema:
                type: string
          content:
            application/json;charset=utf-8:
              schema:
                $ref: '#/components/schemas/Error'
      x-codegen-request-body-name: customer
  /customer/{id}:
    get:
      tags:
        - customer
      summary: Retrieves a Customer by customer node id
      operationId: retrieveCustomer
      parameters:
        - name: id
          in: path
          description: "Customer Node Id, SV_MAPPING: Cust_Acct.XSID_I"
          required: true
          schema:
            type: string
        - name: fields
          in: query
          description: Comma-separated properties to provide in response.The field names
            should be from the first level of property names as defined in Customer
            schema.
          schema:
            type: string
        - name: effectiveDate
          in: query
          description: "To search a specific customer history record details based on\
          \ a given effective date value - Format: yyyy-mm-ddThh:nn:ss "
          schema:
            type: string
            format: date-time
        - name: reason
          in: query
          description: "The reason for which API is called. Valid values: BalanceTransfer.\
          \ This value will be retrieved from RT perestapi.REASON"
          schema:
            type: string
            x-refdata-source: RT-perestapi.REASON
          x-refdata-source: RT-perestapi.REASON
      responses:
        "200":
          description: Success
          content:
            application/json;charset=utf-8:
              schema:
                $ref: '#/components/schemas/Customer'
        "400":
          description: Bad Request
          content:
            application/json;charset=utf-8:
              schema:
                $ref: '#/components/schemas/Error'
        "401":
          description: Unauthorized
          content:
            application/json;charset=utf-8:
              schema:
                $ref: '#/components/schemas/Error'
        "403":
          description: Forbidden
          content:
            application/json;charset=utf-8:
              schema:
                $ref: '#/components/schemas/Error'
        "404":
          description: Not Found
          content:
            application/json;charset=utf-8:
              schema:
                $ref: '#/components/schemas/Error'
        "405":
          description: Method Not allowed
          content:
            application/json;charset=utf-8:
              schema:
                $ref: '#/components/schemas/Error'
        "409":
          description: Conflict
          content:
            application/json;charset=utf-8:
              schema:
                $ref: '#/components/schemas/Error'
        "500":
          description: Internal Server Error
          content:
            application/json;charset=utf-8:
              schema:
                $ref: '#/components/schemas/Error'
    patch:
      tags:
        - customer
      summary: Update a customer by customer node id.
      operationId: patchCustomer
      parameters:
        - name: id
          in: path
          description: "Customer node id, SV_MAPPING: Cust_Acct.XSID_I"
          required: true
          schema:
            type: string
        - name: Ignored-Warning
          in: header
          description: To store warning message IDs in comma separated string that will
            be ignored by the server
          schema:
            type: string
      requestBody:
        description: The Customer to be updated
        content:
          application/json;charset=utf-8:
            schema:
              $ref: '#/components/schemas/Customer_Update'
        required: true
      responses:
        "200":
          description: "Updated. Note: Only id, href and case will be outputted."
          headers:
            Ignored-Warning:
              description: To store warning message IDs in comma separated string
                of same API call that have been successfully ignored in server
              schema:
                type: string
          content:
            application/json;charset=utf-8:
              schema:
                $ref: '#/components/schemas/Customer'
        "400":
          description: Bad Request
          headers:
            Ignored-Warning:
              description: To store warning message IDs in comma separated string
                of same API call that have been successfully ignored in server
              schema:
                type: string
          content:
            application/json;charset=utf-8:
              schema:
                $ref: '#/components/schemas/Error'
        "401":
          description: Unauthorized
          headers:
            Ignored-Warning:
              description: To store warning message IDs in comma separated string
                of same API call that have been successfully ignored in server
              schema:
                type: string
          content:
            application/json;charset=utf-8:
              schema:
                $ref: '#/components/schemas/Error'
        "403":
          description: Forbidden
          headers:
            Ignored-Warning:
              description: To store warning message IDs in comma separated string
                of same API call that have been successfully ignored in server
              schema:
                type: string
          content:
            application/json;charset=utf-8:
              schema:
                $ref: '#/components/schemas/Error'
        "404":
          description: Not Found
          headers:
            Ignored-Warning:
              description: To store warning message IDs in comma separated string
                of same API call that have been successfully ignored in server
              schema:
                type: string
          content:
            application/json;charset=utf-8:
              schema:
                $ref: '#/components/schemas/Error'
        "405":
          description: Method Not allowed
          headers:
            Ignored-Warning:
              description: To store warning message IDs in comma separated string
                of same API call that have been successfully ignored in server
              schema:
                type: string
          content:
            application/json;charset=utf-8:
              schema:
                $ref: '#/components/schemas/Error'
        "409":
          description: Conflict
          headers:
            Ignored-Warning:
              description: To store warning message IDs in comma separated string
                of same API call that have been successfully ignored in server
              schema:
                type: string
          content:
            application/json;charset=utf-8:
              schema:
                $ref: '#/components/schemas/Error'
        "500":
          description: Internal Server Error
          headers:
            Ignored-Warning:
              description: To store warning message IDs in comma separated string
                of same API call that have been successfully ignored in server
              schema:
                type: string
          content:
            application/json;charset=utf-8:
              schema:
                $ref: '#/components/schemas/Error'
      x-codegen-request-body-name: customer
components:
  schemas:
    Customer:
      required:
        - href
        - id
      type: object
      properties:
        id:
          type: string
          description: "Customer id, SV_MAPPING:CustAcct.ObjectKey"
        href:
          type: string
          description: Reference of the customer - <http://<PEREST_HOSTNAME>:<PEREST_PORT>/<customer
            PEREST URL>/<CustAcct.ObjectKey>
        case:
          $ref: '#/components/schemas/CaseRef'
        name:
          type: string
          description: "Customer Name, SV_MAPPING:Cust_Acct.CustAcctName_X"
        status:
          type: string
          description: "Customer Status, SV_MAPPING:Cust_Acct.CustStatus_R"
          x-refdata-source: RT-CUSTOMER_NODE_STATUS
        statusChangeReason:
          type: string
          description: Customer Status Change Reason. SV_MAPPING:Cust_Acct.CustStatusChangeReason_X.
          x-refdata-source: RT-accl.cust.statusChangeReason
        defaultDisplayAccount:
          type: string
          description: Default Account Id. SV_MAPPING:Cust_Acct.PrimaryAcctID_I or
            Account.AcctID_I
        validFor:
          $ref: '#/components/schemas/TimePeriod'
        engagedParty:
          type: array
          description: "Describes defines people who are contacts for a customer.\
            \ Note: phoneNumber will only be shown in the contactMedium. 'op' attribute\
            \ will not be returned by GET customer"
          items:
            $ref: '#/components/schemas/PartyRef'
        characteristic:
          type: array
          description: "Characteristic name supported: CreationDate | ActivationDate\
            \ | CustomerType | PrimaryAccount | IndustryType | CustomerVatNumber |\
            \ SalesRepresentative | CompanyNumer | PrepaidWithoutStatement | DepositAccountNumber\
            \ | OpenCasesCount | PlanName | ServiceName | ServiceStatus | TotalPurchasedServices\
            \ | CompanyType | CompanyRegistrationNumber | CUGId | EmployeeCount |\
            \ FoundedDate | CustomerRank | VATExempt | OfficialLetterRequired | SpecialistCSR\
            \ | PaysForSelf | PaysBySalary | PaymentDueDateOffset | PaymentDueDatePreference\
            \ | TotalChildCustomers | VoucherTopUpStatus | ApartmentOwner | EncouragementDiscountPlan\
            \ | AdminNumber | DoorLockPin | OfficerCSR | ResponsibleTeam | SubTeam\
            \ | PaymentDueDateUOM | MaximumInvoiceAmountPayableCompany | PartialAmount\
            \ | InvoiceEmailAddress. Characteristic value supported: CreationDate\
            \ -> SV_MAPPING:Cust_Acct.CreatedDate_T| ActivationDate -> SV_MAPPING:Cust_Acct.ActiveDate_T\
            \ | CustomerType -> SV_MAPPING:Cust_Acct.Type_R | PrimaryAccount -> SV_MAPPING:Cust_Acct.PrimaryAcctNum_X\
            \ | IndustryType -> SV_MAPPING:Cust_Acct.Industry_R | CustomerVatNumber\
            \ -> SV_MAPPING:Cust_Acct.UI_CustomerVATNumber_X | SalesRepresentative\
            \ -> SV_MAPPING:Cust_Acct.SalesRepresentative_R | CompanyNumer -> SV_MAPPING:Cust_Acct.CompanyNum_X\
            \ | PrepaidWithoutStatement -> SV_MAPPING:Cust_Acct.PrepaidWithoutStatement_B\
            \ | DepositAccountNumber -> SV_MAPPING:Cust_Acct.DepositAcctNum_X | OpenCasesCount\
            \ -> SV_MAPPING:Cust_Acct.CustOpenCases_I | PlanName -> SV_MAPPING:PurchasedProduct.Offer_R\
            \ | ServiceName -> SV_MAPPING:PurchasedProduct.PrimaryService_X | ServiceStatus\
            \ -> SV_MAPPING:PurchasedProduct.Status_R@ |  TotalPurchasedServices ->\
            \ SV_MAPPING:Cust_Acct.CountActiveBaseProducts_I | CompanyType -> SV_MAPPING:Cust_Acct.CompanyType_R\
            \ | CompanyRegistrationNumber -> SV_MAPPING:Cust_Acct.CompanyRegNum_X\
            \ | CUGId -> SV_MAPPING:Cust_Acct.CorporateIdentifier_X | EmployeeCount\
            \ -> SV_MAPPING:Cust_Acct.Employee_Count_I | FoundedDate -> SV_MAPPING:Cust_Acct.Founded_Date_T\
            \ | CustomerRank -> SV_MAPPING:Cust_Acct.CustomerRank_R | VATExempt ->\
            \ SV_MAPPING:Cust_Acct.VatExempt_B | OfficialLetterRequired -> SV_MAPPING:Cust_Acct.OfficialLetterReq_B\
            \ | SpecialistCSR -> SV_MAPPING:Cust_Acct.SpecialistCSR_R | PaysForSelf\
            \ -> SV_MAPPING:Cust_Acct.PaysForSelf_B | PaysBySalary -> SV_MAPPING:Cust_Acct.PaysBySalary_B\
            \ | PaymentDueDateOffset -> SV_MAPPING:Cust_Acct.PaymentOffsetDays_I |\
            \ PaymentDueDatePreference -> SV_MAPPING:Cust_Acct.PaymentDuePref_R |\
            \ TotalChildCustomers -> Derived | VoucherTopUpStatus -> SV_MAPPING:Cust_Acct.VoucherTopUpStatus_B\
            \ | SecutityGroup -> SV_MAPPING:Cust_Acct.Security_Group | ApartmentOwner\
            \ -> SV_MAPPING:Cust_Acct.ApartmentOwner_R | EncouragementDiscountPlan\
            \ -> SV_MAPPING:Cust_Acct.DiscountPlan_R | AdminNumber -> SV_MAPPING:Cust_Acct.AdminNumber_X\
            \ | DoorLockPin -> SV_MAPPING:Cust_Acct.DoorLockPin_X | OfficerCSR ->\
            \ SV_MAPPING:Cust_Acct.OfficerCSR_R | ResponsibleTeam -> SV_MAPPING:Cust_Acct.ResponseTeam_R\
            \ | SubTeam -> SV_MAPPING:Cust_Acct.SubTeam_R | PaymentDueDateUOM -> SV_MAPPING:Cust_Acct.PaymentDueDateUOM_R\
            \ | MaximumInvoiceAmountPayableCompany -> SV_MAPPING:Cust_Acct.MaxInvAmtPayByComp_R\
            \ | PartialAmount -> SV_MAPPING:Cust_Acct.MaxInvAmtPayByComp_C | TimeZone\
            \ -> SV_MAPPING:Cust_Acct.TimeZone_R. Characteristic value type supported:\
            \ string | InvoiceEmailAddress -> SV_MAPPING:Cust_Acct.InvoiceEmail_X"
          items:
            $ref: '#/components/schemas/Characteristic'
          x-refdata-source: '||RT-api.imp.ALL_CC_CUSTOMER_TYPE||CM-Industry|||||||||||RT-COMPANY_TYPE|||||RT-accl.cust.CUSTOMER_RANK|RT-BOOLEAN|RT-BOOLEAN||RT-BOOLEAN|RT-BOOLEAN||RT-PAYMENT_DAY_PREFERENCE||RT-BOOLEAN||RT-accl.cust.DISCOUNT_PLAN|||CM-User|CM-Work_Group|RT-TEAMBRANCH|RT-inv.DATE_OFFSET_UOM|RT-INVOICE_PAYABLE_COMPANY||||||||||||||||||||||||||||||||||||||||||RT-TIME_ZONE|'
        relatedParty:
          type: array
          description: "Describes the parent / child customer details. Note: Attributes\
            \ to be displayed are id, role, href and @referredType only."
          items:
            $ref: '#/components/schemas/PartyRef'
        account:
          type: array
          description: Describes the customer primary account details.
          items:
            $ref: '#/components/schemas/AccountRef'
        creditProfile:
          $ref: '#/components/schemas/CreditProfile'
        contactMedium:
          type: array
          description: "Describes the customer contact medium details. Note: phoneNumber\
            \ will not be returned by GET customer."
          items:
            $ref: '#/components/schemas/ContactMedium'
        paymentMethod:
          type: array
          description: Describes the customer payment methods.
          items:
            $ref: '#/components/schemas/PaymentMethodRef'
        taxExemptionCertificate:
          type: array
          description: Describes the customer tax exemptions.
          items:
            $ref: '#/components/schemas/TaxExemptionCertificate'
        treatmentExemption:
          $ref: '#/components/schemas/TreatmentExemption'
        treatmentSuspension:
          $ref: '#/components/schemas/TreatmentSuspension'
      description: Customer details
    Customer_List:
      type: object
      properties:
        allObjKeys:
          type: array
          description: All object keys which met search criteria. This information
            is used for pagination.
          items:
            $ref: '#/components/schemas/ObjectKey'
        totalObjects:
          type: integer
          description: Total number of items matching criteria
          format: int64
        customers:
          type: array
          description: Describes the list of customers with details
          items:
            $ref: '#/components/schemas/Customer'
        warningMessage:
          type: string
          description: Warning message details.
      description: Customer List
    Customer_Create:
      required:
        - characteristic
        - engagedParty
        - name
      type: object
      properties:
        name:
          type: string
          description: "Customer Name, SV_MAPPING:Cust_Acct.CustAcctName_X"
        status:
          type: string
          description: "Customer status, SV_MAPPING:Cust_Acct.CustStatus_R"
          x-refdata-source: RT-CUSTOMER_NODE_STATUS
        validFor:
          $ref: '#/components/schemas/TimePeriod'
        engagedParty:
          type: array
          description: Describes defines people who are contacts for a customer.
          items:
            $ref: '#/components/schemas/PartyRef'
        characteristic:
          type: array
          description: "Characteristic name supported: CustomerType | IndustryType\
            \ | CustomerVatNumber | SalesRepresentative | CompanyNumber | CompanyType\
            \ | CompanyRegistrationNumber | CUGId | EmployeeCount | FoundedDate |\
            \ CustomerRank | VATExempt | OfficialLetterRequired | SpecialistCSR |\
            \ PaysForSelf | PaysBySalary | PaymentDueDateOffset | PaymentDueDatePreference\
            \ | ApartmentOwner | EncouragementDiscountPlan | AdminNumber | DoorLockPin\
            \ | OfficerCSR | ResponsibleTeam | SubTeam | PaymentDueDateUOM | MaximumInvoiceAmountPayableCompany\
            \ | PartialAmount. Characteristic value supported: SV_MAPPING:Cust_Acct.Type_R,\
            \ SV_MAPPING:Cust_Acct.Industry_R, SV_MAPPING:Cust_Acct.UI_CustomerVATNumber_X,\
            \ SV_MAPPING:Cust_Acct.SalesRepresentative_R, SV_MAPPING:Cust_Acct.CompanyNum_X,\
            \ SV_MAPPING:Cust_Acct.CompanyType_R, SV_MAPPING:Cust_Acct.CompanyRegNum_X,\
            \ SV_MAPPING:Cust_Acct.CorporateIdentifier_X, SV_MAPPING:Cust_Acct.Employee_Count_I,\
            \ SV_MAPPING:Cust_Acct.Founded_Date_T, SV_MAPPING:Cust_Acct.CustomerRank_R,\
            \ SV_MAPPING:Cust_Acct.VatExempt_B, SV_MAPPING:Cust_Acct.OfficialLetterReq_B,\
            \ SV_MAPPING:Cust_Acct.SpecialistCSR_R, SV_MAPPING:Cust_Acct.PaysForSelf_B,\
            \ SV_MAPPING:Cust_Acct.PaysBySalary_B, SV_MAPPING:Cust_Acct.PaymentOffsetDays_I,\
            \ SV_MAPPING:Cust_Acct.PaymentDuePref_R, SV_MAPPING:Cust_Acct.ApartmentOwner_R,\
            \ SV_MAPPING:Cust_Acct.DiscountPlan_R, SV_MAPPING:Cust_Acct.AdminNumber_X,\
            \ SV_MAPPING:Cust_Acct.DoorLockPin_X, SV_MAPPING:Cust_Acct.OfficerCSR_R,\
            \ SV_MAPPING:Cust_Acct.ResponseTeam_R, SV_MAPPING:Cust_Acct.SubTeam_R,\
